                key: fw.dmz.js
          master_item:
            key: fw.dmz.js
          lld_macro_paths:
            - lld_macro: '{#DMZ_ID}'
              path: $.id
            - lld_macro: '{#DMZ_IP}'
              path: $.ip
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var dmz = data.result;
                  if (!dmz || typeof dmz !== 'object') {
                      return '[]';
                  }

                  var ip = dmz.ip || '';
                  if (!ip && dmz.enabled !== true) {
                      return '[]';
                  }

                  return JSON.stringify([{
                      id: 'dmz',
                      ip: ip || 'non impostato'
                  }]);
        - uuid: 0c15c8a09a534d998756c50c6e7e6585
          name: 'Switch ports discovery'
          type: DEPENDENT
          key: switch.ports.discovery
          delay: '0'
          item_prototypes:
            - uuid: 41cfb82c1b134f6d997c5e6cc20a97fe
              name: 'Switch {#PORT_NAME}: duplex'
              type: DEPENDENT
              key: 'switch.port.duplex["{#PORT_ID}"]'
              value_type: TEXT
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return ports[i].duplex;
                          }
                      }
                      return '';
              master_item:
                key: switch.status.js
            - uuid: 083bbe6d44f944dc997e4208b1b00f94
              name: 'Switch {#PORT_NAME}: link'
              type: DEPENDENT
              key: 'switch.port.link["{#PORT_ID}"]'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return ports[i].link === 'up' ? 1 : 0;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
            - uuid: e59165ac2cdf46a1a8ef221169d341a0
              name: 'Switch {#PORT_NAME}: MAC collegati'
              type: DEPENDENT
              key: 'switch.port.mac_count["{#PORT_ID}"]'
              trends: 365d
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return (ports[i].mac_list || []).length;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
            - uuid: a140b613958b4d9ab3bbe2d6bcb0b12d
              name: 'Switch {#PORT_NAME}: velocità link'
              type: DEPENDENT
              key: 'switch.port.speed["{#PORT_ID}"]'
              trends: 365d
              units: bps
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return parseInt(ports[i].speed, 10) * 1000000;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
          graph_prototypes:
            - uuid: bd3dcfe2e23e45ab9ba3a028e392bfa7
              name: 'Switch {#PORT_NAME}: stato porta'
              graph_items:
                - color: 199C0D
