      discovery_rules:
        - uuid: e5e10d838d3e460d8c91e8de71184cb7
          name: 'System sensors discovery'
          type: DEPENDENT
          key: system.sensors.discovery
          delay: '0'
          item_prototypes:
            - uuid: 104bd956e96047c2be9a39b2b64bc0e8
              name: 'Temperatura sensore {#SENSOR_NAME}'
              type: DEPENDENT
              key: 'system.sensor.temperature["{#SENSOR_ID}"]'
              trends: 365d
              units: °C
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var sensors = data.result ? data.result.sensors || [] : [];
                      var id = '{#SENSOR_ID}';
                      for (var i = 0; i < sensors.length; i++) {
                          if (sensors[i].id === id) {
                              return sensors[i].value;
                          }
                      }
                      return null;
              master_item:
                key: system.js
              trigger_prototypes:
                - uuid: a38fd7b6c6954525bcd9dd77d4133ef9
                  expression: 'last(/IliadBox GUI Password/system.sensor.temperature["{#SENSOR_ID}"])>{$TEMP_WARN}'
                  name: 'Iliad Box: temperatura alta su {#SENSOR_NAME}'
                  priority: WARNING
                  manual_close: 'YES'
                - uuid: 7e1ade5720e642969ab105897eaa5c5d
                  expression: 'last(/IliadBox GUI Password/system.sensor.temperature["{#SENSOR_ID}"])>{$TEMP_HIGH}'
                  name: 'Iliad Box: temperatura critica su {#SENSOR_NAME}'
                  priority: HIGH
                  manual_close: 'YES'
          graph_prototypes:
            - uuid: b0f4496ed6f34900b17febe17d8d6957
              name: 'Sensore {#SENSOR_NAME}: temperatura'
              graph_items:
                - color: 199C0D
                  item:
                    host: IliadBox GUI Password
                    key: 'system.sensor.temperature["{#SENSOR_ID}"]'
          master_item:
            key: system.js
          lld_macro_paths:
            - lld_macro: '{#SENSOR_ID}'
              path: $.id
            - lld_macro: '{#SENSOR_NAME}'
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.result.sensors
