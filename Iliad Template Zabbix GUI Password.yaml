        - uuid: ae16823a244a485f82929276e8b647d2
          name: 'GUI Session Cookie'
          type: SCRIPT
          key: iliadbox.gui.session.cookie
          delay: 30s
          history: '0'
          value_type: TEXT
          params: |
            var params = JSON.parse(value);

            function stringToBytes(str) {
                str = unescape(encodeURIComponent(str));
                var bytes = [];
                for (var i = 0; i < str.length; i++) {
                    bytes.push(str.charCodeAt(i) & 0xff);
                }
                return bytes;
            }

            function bytesToHex(bytes) {
                var hex = '';
                for (var i = 0; i < bytes.length; i++) {
                    hex += ('0' + bytes[i].toString(16)).slice(-2);
                }
                return hex;
            }

            function sha1Bytes(bytes) {
                var h0 = 0x67452301;
                var h1 = 0xefcdab89;
                var h2 = 0x98badcfe;
                var h3 = 0x10325476;
                var h4 = 0xc3d2e1f0;
                var bitLength = bytes.length * 8;
                bytes = bytes.slice(0);
                bytes.push(0x80);
                while ((bytes.length % 64) !== 56) {
                    bytes.push(0);
                }

                var highLength = Math.floor(bitLength / 0x100000000);
                var lowLength = bitLength & 0xffffffff;
                for (var i = 3; i >= 0; i--) {
                    bytes.push((highLength >>> (i * 8)) & 0xff);
                }
                for (i = 3; i >= 0; i--) {
                    bytes.push((lowLength >>> (i * 8)) & 0xff);
                }

                for (var chunk = 0; chunk < bytes.length; chunk += 64) {
                    var words = [];
                    for (var j = 0; j < 16; j++) {
                        words[j] = (bytes[chunk + j * 4] << 24) |
                            (bytes[chunk + j * 4 + 1] << 16) |
                            (bytes[chunk + j * 4 + 2] << 8) |
                            bytes[chunk + j * 4 + 3];
                    }
                    for (j = 16; j < 80; j++) {
                        var rotated = words[j - 3] ^ words[j - 8] ^ words[j - 14] ^ words[j - 16];
                        words[j] = (rotated << 1) | (rotated >>> 31);
                    }

                    var a = h0;
                    var b = h1;
                    var c = h2;
                    var d = h3;
                    var e = h4;
                    for (j = 0; j < 80; j++) {
                        var f;
                        var k;
                        if (j < 20) {
                            f = (b & c) | ((~b) & d);
                            k = 0x5a827999;
                        }
                        else if (j < 40) {
                            f = b ^ c ^ d;
                            k = 0x6ed9eba1;
                        }
                        else if (j < 60) {
                            f = (b & c) | (b & d) | (c & d);
                            k = 0x8f1bbcdc;
                        }
                        else {
                            f = b ^ c ^ d;
                            k = 0xca62c1d6;
                        }

                        var temp = (((a << 5) | (a >>> 27)) + f + e + k + words[j]) | 0;
                        e = d;
                        d = c;
                        c = (b << 30) | (b >>> 2);
                        b = a;
                        a = temp;
                    }

                    h0 = (h0 + a) | 0;
                    h1 = (h1 + b) | 0;
                    h2 = (h2 + c) | 0;
                    h3 = (h3 + d) | 0;
                    h4 = (h4 + e) | 0;
                }

                var digest = [];
                var hashWords = [h0, h1, h2, h3, h4];
                for (i = 0; i < hashWords.length; i++) {
                    for (j = 3; j >= 0; j--) {
                        digest.push((hashWords[i] >>> (j * 8)) & 0xff);
                    }
                }
                return digest;
            }

            function sha1Hex(str) {
                return bytesToHex(sha1Bytes(stringToBytes(str)));
            }

            function hmacSha1Hex(key, message) {
                var blockSize = 64;
                var keyBytes = stringToBytes(key);
                if (keyBytes.length > blockSize) {
                    keyBytes = sha1Bytes(keyBytes);
                }
                while (keyBytes.length < blockSize) {
                    keyBytes.push(0);
                }

                var outerPad = [];
                var innerPad = [];
                for (var i = 0; i < blockSize; i++) {
                    outerPad[i] = keyBytes[i] ^ 0x5c;
                    innerPad[i] = keyBytes[i] ^ 0x36;
                }

                return bytesToHex(sha1Bytes(outerPad.concat(sha1Bytes(innerPad.concat(stringToBytes(message))))));
            }

            function addBaseHeaders(request) {
                request.addHeader('Accept: application/json');
                request.addHeader('X-FBX-FREEBOX0S: 1');
                request.addHeader('X-Fbx-App-Id: fr.freebox.mafreebox');
            }

            function buildChallenge(challenge) {
                if (typeof challenge === 'string') {
                    return challenge;
                }

                var result = '';
                for (var i in challenge) {
                    result += '' + eval(challenge[i]);
                }
                return result;
            }

            function getFreeboxCookie(headers) {
                var setCookie = headers['Set-Cookie'] || headers['set-cookie'];
                if (!setCookie) {
                    throw 'Set-Cookie header not found after login';
                }
                if (typeof setCookie !== 'string') {
                    setCookie = setCookie.join('; ');
                }

                var match = setCookie.match(/FREEBOXOS=([^;]+)/);
                if (!match) {
                    throw 'FREEBOXOS cookie not found after login';
                }
                return match[1];
            }

            if (!params.password || params.password === '{$GUI_PASSWORD}') {
                throw 'Missing {$GUI_PASSWORD} macro value';
            }

            var baseUrl = params.protocol + '://' + params.freeboxip;
            var loginStateRequest = new HttpRequest();
            addBaseHeaders(loginStateRequest);
            var loginState = JSON.parse(loginStateRequest.get(baseUrl + '/api/latest/login/'));
            if (loginState.success !== true) {
                throw 'Login challenge failed: ' + JSON.stringify(loginState);
            }

            var challenge = buildChallenge(loginState.result.challenge);
            var saltedPassword = sha1Hex(loginState.result.password_salt + params.password);
            var passwordDigest = hmacSha1Hex(saltedPassword, challenge);

            var loginRequest = new HttpRequest();
            addBaseHeaders(loginRequest);
            loginRequest.addHeader('Content-Type: application/x-www-form-urlencoded; charset=UTF-8');
            var loginResponse = JSON.parse(loginRequest.post(baseUrl + '/api/latest/login/', 'password=' + passwordDigest));
            if (loginResponse.success !== true) {
                throw 'Login failed: ' + JSON.stringify(loginResponse);
            }

            return getFreeboxCookie(loginRequest.getHeaders());
          timeout: 15s
          parameters:
            - name: freeboxip
              value: '{$FREEBOXIP}'
            - name: password
              value: '{$GUI_PASSWORD}'
            - name: protocol
              value: '{$FREEBOX_PROTOCOL}'
