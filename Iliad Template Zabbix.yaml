        - uuid: cfc247282c234f4cb90309f30d3598dd
          name: 'LAN host attivi'
          type: DEPENDENT
          key: lan.hosts.active
          trends: 365d
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var hosts = data.result || [];
                  var count = 0;
                  for (var i = 0; i < hosts.length; i++) {
                      if (hosts[i].active === true) {
                          count++;
                      }
                  }
                  return count;
          master_item:
            key: lan.browser.js
        - uuid: 22f8bd546625482a91f257a801a7d279
