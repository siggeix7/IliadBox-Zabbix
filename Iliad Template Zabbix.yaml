          name: 'Connection Config JS'
          type: DEPENDENT
          key: connection.config.js
          history: '0'
          value_type: TEXT
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  sessiontoken = value;
                  
                  var freeboxip = '{$FREEBOXIP}';
                  
                  var urlapi = '{$FREEBOX_PROTOCOL}://'+freeboxip+'/api/v11/connection/config';
                  
                  
                  try {
                      req = new HttpRequest();
                      req.addHeader('X-Fbx-App-Auth: '+sessiontoken);
                      apiresp = JSON.parse(req.get(urlapi));
                  } catch (error) {
                      Zabbix.Log(3, "Script failed to login into API and obtain data")
                      return 1;
                  }
                  
                  return JSON.stringify(apiresp);
                  
                  
                  
                  
          master_item:
            key: 'session-token-iliadbox.py[{$APPTOKEN},{$FREEBOXIP},{$APIVER},{$APP_ID},{$FREEBOX_PROTOCOL}]'
