      discovery_rules:
        - uuid: f53706f864e946eca53873cb237cbb35
          name: 'System sensors discovery'
          type: DEPENDENT
          key: system.sensors.discovery
          delay: '0'
          item_prototypes:
            - uuid: 74db8ca515d045998d6919c2d486a61c
              name: 'Temperatura sensore {#SENSOR_NAME}'
              type: DEPENDENT
              key: 'system.sensor.temperature["{#SENSOR_ID}"]'
              trends: 365d
              units: °C
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var sensors = data.result ? data.result.sensors || [] : [];
                      var id = '{#SENSOR_ID}';
                      for (var i = 0; i < sensors.length; i++) {
                          if (sensors[i].id === id) {
                              return sensors[i].value;
                          }
                      }
                      return null;
              master_item:
                key: system.js
              trigger_prototypes:
                - uuid: 2a0daed3cb954f1bb963a6d4e5686334
                  expression: 'last(/IliadBox/system.sensor.temperature["{#SENSOR_ID}"])>{$TEMP_WARN}'
                  name: 'Iliad Box: temperatura alta su {#SENSOR_NAME}'
                  priority: WARNING
                  manual_close: 'YES'
                - uuid: f8a14557accf450b83652eb1c18e385b
                  expression: 'last(/IliadBox/system.sensor.temperature["{#SENSOR_ID}"])>{$TEMP_HIGH}'
                  name: 'Iliad Box: temperatura critica su {#SENSOR_NAME}'
                  priority: HIGH
                  manual_close: 'YES'
          master_item:
            key: system.js
          lld_macro_paths:
            - lld_macro: '{#SENSOR_ID}'
              path: $.id
            - lld_macro: '{#SENSOR_NAME}'
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.result.sensors
