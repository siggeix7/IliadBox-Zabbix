        - uuid: 1d2fd8b7319145bda97beffe57ab4ee7
          name: 'Switch ports discovery'
          type: DEPENDENT
          key: switch.ports.discovery
          delay: '0'
          item_prototypes:
            - uuid: 2367450e74e947d6b4797205fdc26af9
              name: 'Switch {#PORT_NAME}: duplex'
              type: DEPENDENT
              key: 'switch.port.duplex["{#PORT_ID}"]'
              value_type: TEXT
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return ports[i].duplex;
                          }
                      }
                      return '';
              master_item:
                key: switch.status.js
            - uuid: 3cd04557a89849fc86d4318c291e9cc3
              name: 'Switch {#PORT_NAME}: link'
              type: DEPENDENT
              key: 'switch.port.link["{#PORT_ID}"]'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return ports[i].link === 'up' ? 1 : 0;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
            - uuid: 565284e6f30e4f54bd9fa2d82e9bd39f
              name: 'Switch {#PORT_NAME}: MAC collegati'
              type: DEPENDENT
              key: 'switch.port.mac_count["{#PORT_ID}"]'
              trends: 365d
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return (ports[i].mac_list || []).length;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
            - uuid: f3dae35b5515405f9774bdc719c5174e
              name: 'Switch {#PORT_NAME}: velocità link'
              type: DEPENDENT
              key: 'switch.port.speed["{#PORT_ID}"]'
              trends: 365d
              units: bps
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var ports = data.result || [];
                      var id = '{#PORT_ID}';
                      for (var i = 0; i < ports.length; i++) {
                          if (String(ports[i].id) === id) {
                              return parseInt(ports[i].speed, 10) * 1000000;
                          }
                      }
                      return 0;
              master_item:
                key: switch.status.js
          master_item:
            key: switch.status.js
          lld_macro_paths:
