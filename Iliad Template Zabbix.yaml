              name: 'DMZ {#DMZ_IP}: abilitata'
              type: DEPENDENT
              key: 'fw.dmz.discovery.enabled["{#DMZ_ID}"]'
              valuemap:
                name: 'IliadBox: abilitato/disabilitato'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var dmz = data.result || {};
                      return dmz.enabled === true ? 1 : 0;
              master_item:
                key: fw.dmz.js
          master_item:
            key: fw.dmz.js
          lld_macro_paths:
            - lld_macro: '{#DMZ_ID}'
              path: $.id
            - lld_macro: '{#DMZ_IP}'
              path: $.ip
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var dmz = data.result;
                  if (!dmz || typeof dmz !== 'object') {
                      return '[]';
                  }

                  var ip = dmz.ip || '';
                  if (!ip && dmz.enabled !== true) {
                      return '[]';
                  }

                  return JSON.stringify([{
                      id: 'dmz',
                      ip: ip || 'non impostato'
                  }]);
