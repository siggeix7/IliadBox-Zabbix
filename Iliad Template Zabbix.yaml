          description: 'Protocollo locale usato dagli item JavaScript. Usare https solo se il certificato Freebox e il trust store di Zabbix sono configurati.'
        - macro: '{$TEMP_WARN}'
          value: '70'
          description: 'Soglia warning temperatura sensori in gradi Celsius.'
        - macro: '{$TEMP_HIGH}'
          value: '80'
          description: 'Soglia high temperatura sensori in gradi Celsius.'
        - macro: '{$FAN_SPEED_MIN}'
          value: '500'
          description: 'Velocita minima ventola in rpm, valutata dopo 10 minuti di uptime.'
