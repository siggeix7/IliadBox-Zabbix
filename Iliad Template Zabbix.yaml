        - uuid: e9b4b68e54d448f78ab3994dd6b32a77
          name: 'Port forwarding discovery'
          type: DEPENDENT
          key: fw.redir.discovery
          delay: '0'
          item_prototypes:
            - uuid: bb591edbb9fc474b9478716f6618873f
              name: 'Port forwarding {#FWREDIR_NAME}: abilitato'
              type: DEPENDENT
              key: 'fw.redir.enabled["{#FWREDIR_ID}"]'
              valuemap:
                name: 'IliadBox: abilitato/disabilitato'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var rules = data.result || [];
                      var id = '{#FWREDIR_ID}';
                      for (var i = 0; i < rules.length; i++) {
                          if (String(rules[i].id) === id) {
                              return rules[i].enabled === true ? 1 : 0;
                          }
                      }
                      return 0;
              master_item:
                key: fw.redir.js
          master_item:
            key: fw.redir.js
          lld_macro_paths:
            - lld_macro: '{#FWREDIR_ID}'
              path: $.id
            - lld_macro: '{#FWREDIR_NAME}'
              path: $.name
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var rules = data.result || [];
                  var result = [];
                  for (var i = 0; i < rules.length; i++) {
                      if (rules[i].id === null || typeof rules[i].id === 'undefined') {
                          continue;
                      }

                      var proto = rules[i].ip_proto || '';
                      var start = rules[i].wan_port_start || '';
                      var end = rules[i].wan_port_end || '';
                      var port = String(start);
                      if (end && String(end) !== String(start)) {
                          port += '-' + end;
                      }

                      var target = (rules[i].lan_ip || '') + ':' + (rules[i].lan_port || '');
                      var detail = proto + '/' + port + ' -> ' + target;
                      var comment = rules[i].comment || '';
                      result.push({
                          id: String(rules[i].id),
                          name: comment ? comment + ' (' + detail + ')' : detail
                      });
                  }
                  return JSON.stringify(result);
        - uuid: ac8c1d42e2e840b4981f49bd027dd584
          name: 'DMZ discovery'
          type: DEPENDENT
