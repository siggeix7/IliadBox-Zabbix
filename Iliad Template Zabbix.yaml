        - uuid: 402dca38fce3414d8161cb0a23d8868e
          name: 'WiFi BSS JS'
          type: DEPENDENT
          key: wifi.bss.js
          history: '0'
          value_type: TEXT
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  sessiontoken = value;
                  var freeboxip = '{$FREEBOXIP}';
                  var urlapi = '{$FREEBOX_PROTOCOL}://'+freeboxip+'/api/v8/wifi/bss/';

                  try {
                      req = new HttpRequest();
                      req.addHeader('X-Fbx-App-Auth: '+sessiontoken);
                      apiresp = JSON.parse(req.get(urlapi));
                  } catch (error) {
                      Zabbix.Log(3, 'Script failed to obtain WiFi BSS data: '+error);
                      return 1;
                  }

                  if (apiresp.result && apiresp.result.length) {
                      for (var i = 0; i < apiresp.result.length; i++) {
                          if (apiresp.result[i].config) {
                              delete apiresp.result[i].config.key;
                          }
                          if (apiresp.result[i].bss_params) {
                              delete apiresp.result[i].bss_params.key;
                          }
                          if (apiresp.result[i].shared_bss_params) {
                              delete apiresp.result[i].shared_bss_params.key;
                          }
                      }
                  }

                  return JSON.stringify(apiresp);
          master_item:
            key: 'session-token-iliadbox.py[{$APPTOKEN},{$FREEBOXIP},{$APIVER},{$APP_ID},{$FREEBOX_PROTOCOL}]'
